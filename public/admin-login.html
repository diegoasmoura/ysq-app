<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — Agenda Clinical</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
  .login-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding: 20px; }
  .login-card { width: 100%; max-width: 380px; }
  .login-card h1 { font-family: var(--font-display); font-size: 22px; color: var(--sage-deep); margin: 0 0 4px; text-align:center; }
  .login-card p.sub { text-align:center; color: var(--ink-soft); font-size: 13.5px; margin: 0 0 26px; }
  .error-msg { color: var(--danger); font-size: 13.5px; margin-bottom: 12px; display:none; }
</style>
</head>
<body>
<button id="themeToggle" class="theme-btn" aria-label="Alternar tema claro/escuro" title="Alternar tema" style="position:fixed;top:14px;right:20px;z-index:20;">🌙</button>
<div class="login-wrap">
  <div class="card login-card">
    <h1>Agenda Clinical</h1>
    <p class="sub">Painel do terapeuta — YSQ-L3</p>
    <div class="error-msg" id="errorMsg"></div>
    <form id="loginForm">
      <div class="form-row">
        <label for="username">Usuário</label>
        <input class="input" id="username" name="username" autocomplete="username" required>
      </div>
      <div class="form-row">
        <label for="password">Senha</label>
        <input class="input" id="password" type="password" name="password" autocomplete="current-password" required>
      </div>
      <button class="btn btn-primary btn-block" type="submit" style="padding:13px;">Entrar</button>
    </form>
  </div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const errorMsg = document.getElementById('errorMsg');
  errorMsg.style.display = 'none';

  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) {
      errorMsg.textContent = data.error || 'Erro ao entrar';
      errorMsg.style.display = 'block';
      return;
    }
    window.location.href = '/admin';
  } catch (e) {
    errorMsg.textContent = 'Erro de conexão. Tente novamente.';
    errorMsg.style.display = 'block';
  }
});

// Theme toggle
const themeToggle = document.getElementById('themeToggle');
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('ysq-theme', theme);
  themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
}
(function() {
  const stored = localStorage.getItem('ysq-theme');
  if (stored === 'dark' || stored === 'light') setTheme(stored);
  else if (window.matchMedia('(prefers-color-scheme: dark)').matches) setTheme('dark');
})();
themeToggle.addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  setTheme(current === 'dark' ? 'light' : 'dark');
});
</script>
</body>
</html>
